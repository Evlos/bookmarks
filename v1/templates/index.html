<!DOCTYPE html>
<html lang="zh" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>书签收藏夹</title>
  <!-- Tailwind CDN (v3 play) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#818cf8' }
          }
        }
      }
    }
  </script>
  <!-- Apply saved theme BEFORE first paint to avoid flash -->
  <script>
    (function(){
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* slim scrollbar */
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#a5b4fc;border-radius:9999px}
    .dark ::-webkit-scrollbar-thumb{background:#4f46e5}
    /* tag pill */
    .tag-pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 10px;border-radius:9999px;font-size:.75rem;font-weight:500;
      cursor:pointer;transition:all .15s;
      background:#e0e7ff;color:#4338ca;
    }
    .dark .tag-pill{background:#312e81;color:#c7d2fe}
    .tag-pill:hover,.tag-pill.active{background:#6366f1;color:#fff}
    .dark .tag-pill:hover,.dark .tag-pill.active{background:#818cf8;color:#1e1b4b}
    /* fade-in */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .fade-in{animation:fadeIn .2s ease both}
  </style>
</head>

<body class="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-200">

<!-- ── Top bar ─────────────────────────────────────────────────────────────── -->
<header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-800/80 backdrop-blur border-b border-slate-200 dark:border-slate-700 shadow-sm">
  <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center gap-3">
    <span class="text-xl font-bold text-indigo-600 dark:text-indigo-400 whitespace-nowrap">📌 书签</span>

    <!-- Add form -->
    <div class="flex-1 flex items-center gap-2" id="addForm">
      <input id="urlInput" type="url" placeholder="粘贴 URL，失去焦点自动获取信息，回车添加…"
        class="flex-1 min-w-0 px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600
               bg-white dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400
               placeholder:text-slate-400 dark:placeholder:text-slate-500"/>
      <input id="titleInput" type="text" placeholder="标题"
        class="w-40 px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600
               bg-white dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      <input id="tagsInput" type="text" placeholder="标签（逗号分隔）"
        class="w-44 px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600
               bg-white dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      <button id="addBtn" onclick="addBookmark()"
        class="px-4 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition shrink-0">
        ＋ 添加
      </button>
    </div>

    <!-- Fetch indicator -->
    <span id="fetchIndicator" class="text-xs text-slate-400 dark:text-slate-500 hidden whitespace-nowrap">⏳ 获取中…</span>

    <!-- Theme toggle -->
    <button id="themeBtn" onclick="toggleTheme()"
      class="ml-2 p-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 transition shrink-0"
      title="切换主题">
      <span id="iconSun" class="hidden">
        <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5" stroke-width="2"/>
          <path stroke-width="2" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </span>
      <span id="iconMoon">
        <svg class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
        </svg>
      </span>
    </button>
  </div>
</header>

<!-- ── Main layout ──────────────────────────────────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-4 py-5 flex gap-5">

  <!-- Sidebar: Tags -->
  <aside class="w-44 shrink-0">
    <div class="sticky top-20 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm">
      <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-3">标签</h2>
      <div id="tagList" class="flex flex-col gap-1.5">
        <span class="tag-pill active" data-tag="" onclick="filterByTag(this, '')">🏷 全部</span>
      </div>
    </div>
  </aside>

  <!-- Bookmark list -->
  <main class="flex-1 min-w-0">
    <div id="bookmarkList" class="flex flex-col gap-3"></div>
    <div id="emptyState" class="hidden text-center py-20 text-slate-400 dark:text-slate-600">
      <div class="text-5xl mb-3">🔖</div>
      <p class="text-sm">还没有书签，快去添加吧！</p>
    </div>
  </main>
</div>

<!-- ── Edit Modal ───────────────────────────────────────────────────────────── -->
<div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 border border-slate-200 dark:border-slate-700">
    <h3 class="font-bold text-lg mb-4">✏️ 编辑书签</h3>
    <input type="hidden" id="editId"/>
    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">标题</label>
    <input id="editTitle" type="text" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">图标 URL</label>
    <input id="editIcon" type="text" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">标签（逗号分隔）</label>
    <input id="editTags" type="text" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm mb-5 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
    <div class="flex justify-end gap-2">
      <button onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition">取消</button>
      <button onclick="saveEdit()" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition">保存</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let activeTag = '';
let fetchedMeta = {};

// ── Theme ──────────────────────────────────────────────────────────────────────
function updateThemeIcons() {
  const dark = document.documentElement.classList.contains('dark');
  document.getElementById('iconSun').classList.toggle('hidden', !dark);
  document.getElementById('iconMoon').classList.toggle('hidden', dark);
}

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  updateThemeIcons();
}

updateThemeIcons();

// ── Fetch meta on blur ─────────────────────────────────────────────────────────
document.getElementById('urlInput').addEventListener('blur', async function() {
  const url = this.value.trim();
  if (!url) return;
  document.getElementById('fetchIndicator').classList.remove('hidden');
  try {
    const res = await fetch('/api/fetch-meta?url=' + encodeURIComponent(url));
    const data = await res.json();
    fetchedMeta = data;
    if (data.title && !document.getElementById('titleInput').value) {
      document.getElementById('titleInput').value = data.title;
    }
  } catch(e) {}
  document.getElementById('fetchIndicator').classList.add('hidden');
});

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addBookmark();
});
document.getElementById('titleInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addBookmark();
});
document.getElementById('tagsInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addBookmark();
});

// ── Add bookmark ───────────────────────────────────────────────────────────────
async function addBookmark() {
  const url   = document.getElementById('urlInput').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  const tags  = document.getElementById('tagsInput').value.split(',').map(t=>t.trim()).filter(Boolean);
  if (!url) { alert('请输入 URL'); return; }
  const icon = fetchedMeta.icon || '';
  const res = await fetch('/api/bookmarks', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ url, title: title||url, icon, tags })
  });
  if (res.ok) {
    document.getElementById('urlInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('tagsInput').value = '';
    fetchedMeta = {};
    await loadAll();
  }
}

// ── Load & render ──────────────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadBookmarks(), loadTags()]);
}

async function loadBookmarks() {
  const url = '/api/bookmarks' + (activeTag ? '?tag=' + encodeURIComponent(activeTag) : '');
  const res = await fetch(url);
  const items = await res.json();
  renderBookmarks(items);
}

async function loadTags() {
  const res = await fetch('/api/tags');
  const tags = await res.json();
  const list = document.getElementById('tagList');
  // keep "全部" pill
  list.innerHTML = '<span class="tag-pill' + (activeTag===''?' active':'') + '" data-tag="" onclick="filterByTag(this,\'\')">🏷 全部</span>';
  tags.forEach(t => {
    const el = document.createElement('span');
    el.className = 'tag-pill' + (activeTag===t?' active':'');
    el.dataset.tag = t;
    el.onclick = function() { filterByTag(this, t); };
    el.textContent = t;
    list.appendChild(el);
  });
}

function renderBookmarks(items) {
  const list = document.getElementById('bookmarkList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  if (!items.length) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  items.forEach(b => {
    const tags = b.tags ? b.tags.split(',').filter(Boolean) : [];
    const tagHtml = tags.map(t =>
      `<span class="tag-pill text-xs py-0.5 px-2" onclick="filterByTag(null,'${t}')">${t}</span>`
    ).join('');
    const iconSrc = b.icon ? `/api/proxy-icon?url=${encodeURIComponent(b.icon)}` : '';
    const iconHtml = iconSrc
      ? `<img src="${iconSrc}" class="w-5 h-5 rounded shrink-0 object-contain" onerror="this.replaceWith(defaultIcon())" />`
      : defaultIcon().outerHTML;
    const card = document.createElement('div');
    card.className = 'fade-in bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 px-4 py-3 flex items-center gap-3 shadow-sm hover:shadow-md transition-shadow';
    card.innerHTML = `
      ${iconHtml}
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <a href="${b.url}" target="_blank" rel="noopener"
             class="font-medium text-slate-800 dark:text-slate-100 hover:text-indigo-600 dark:hover:text-indigo-400 truncate text-sm">
            ${escHtml(b.title)}
          </a>
        </div>
        <div class="flex items-center gap-2 mt-0.5">
          <a href="${b.url}" target="_blank" rel="noopener"
             class="text-xs text-slate-400 dark:text-slate-500 truncate max-w-xs hover:underline" title="${b.url}">
            ${escHtml(b.url)}
          </a>
          <span class="text-slate-300 dark:text-slate-600 text-xs">·</span>
          <span class="text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">${b.created_at.slice(0,10)}</span>
        </div>
        <div class="flex flex-wrap gap-1 mt-1">${tagHtml}</div>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button onclick='openEdit(${JSON.stringify(b)})'
          class="p-1.5 rounded-lg text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition" title="编辑">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button onclick="deleteBookmark(${b.id})"
          class="p-1.5 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition" title="删除">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>`;
    list.appendChild(card);
  });
}

function defaultIcon() {
  const s = document.createElement('span');
  s.className = 'w-5 h-5 rounded bg-indigo-100 dark:bg-indigo-900 text-indigo-500 dark:text-indigo-300 flex items-center justify-center text-xs shrink-0';
  s.textContent = '🔗';
  return s;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tags filter ────────────────────────────────────────────────────────────────
function filterByTag(el, tag) {
  activeTag = tag;
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    // find matching pill in sidebar
    document.querySelectorAll('#tagList .tag-pill').forEach(p => {
      if (p.dataset.tag === tag) p.classList.add('active');
    });
  }
  loadBookmarks();
}

// ── Delete ─────────────────────────────────────────────────────────────────────
async function deleteBookmark(id) {
  if (!confirm('确定删除这个书签？')) return;
  await fetch('/api/bookmarks/' + id, { method: 'DELETE' });
  await loadAll();
}

// ── Edit modal ─────────────────────────────────────────────────────────────────
function openEdit(b) {
  document.getElementById('editId').value = b.id;
  document.getElementById('editTitle').value = b.title || '';
  document.getElementById('editIcon').value = b.icon || '';
  document.getElementById('editTags').value = b.tags || '';
  document.getElementById('editModal').classList.remove('hidden');
  document.getElementById('editModal').classList.add('flex');
}

function closeModal() {
  document.getElementById('editModal').classList.add('hidden');
  document.getElementById('editModal').classList.remove('flex');
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function saveEdit() {
  const id    = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value.trim();
  const icon  = document.getElementById('editIcon').value.trim();
  const tags  = document.getElementById('editTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  await fetch('/api/bookmarks/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, icon, tags })
  });
  closeModal();
  await loadAll();
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
